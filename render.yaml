# render.yaml
# Render.com deployment configuration
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: japan-fire-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore   # closest free region to Japan

    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: japanfire-db
          property: connectionString

      - key: FIRMS_API_KEY
        sync: false   # set manually in Render dashboard

      - key: FIRMS_POLL_INTERVAL_MIN
        value: "60"

      - key: DB_ECHO
        value: "false"

      - key: ALLOWED_ORIGINS
        value: "*"

    healthCheckPath: /api/health

databases:
  - name: japanfire-db
    plan: free
    databaseName: japanfire
    postgresMajorVersion: 16
